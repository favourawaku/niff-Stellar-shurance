name: Prisma ERD

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/prisma/schema.prisma'

permissions:
  contents: write

jobs:
  generate-erd:
    name: Generate ERD
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install ERD generator
        run: npm install --no-save prisma-erd-generator

      - name: Generate ERD (SVG)
        run: |
          printf '\ngenerator erd {\n  provider = "prisma-erd-generator"\n  output   = "../docs/.erd.svg"\n}\n' \
            >> prisma/schema.prisma
          npx prisma generate --generator erd
          git checkout prisma/schema.prisma

      - name: Install rsvg-convert
        run: sudo apt-get install -y librsvg2-bin

      - name: Convert SVG to PNG
        run: |
          rsvg-convert -w 2400 docs/.erd.svg -o docs/erd.png
          rm docs/.erd.svg

      - name: Commit ERD
        uses: stefanzweifel/git-auto-commit-action@8621c40c2e8d34bd70b07b9e65c8ef45e80cfe4c # v5.0.1
        with:
          commit_message: "docs: regenerate ERD from schema changes"
          file_pattern: backend/docs/erd.png
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
